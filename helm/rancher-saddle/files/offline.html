<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2453ff" />
    <title>Rancher — offline</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
        font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif;
        color: #e7e9ee;
        background: #1b1f2b;
      }
      .mark {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        background: linear-gradient(150deg, #3a73ff 0%, #1c39b8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 44px;
        font-weight: 800;
        color: #fff;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0;
      }
      p {
        margin: 0;
        color: #9aa0ad;
        max-width: 28rem;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.6rem 1.4rem;
        font-size: 1rem;
        border: 0;
        border-radius: 8px;
        background: #2453ff;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="mark">R</div>
    <h1>You're offline</h1>
    <p>
      Rancher can't be reached right now. The dashboard needs a live connection
      to your cluster — reconnect and try again.
    </p>
    <button onclick="location.reload()">Retry</button>
  </body>
</html>
