apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rancher-saddle.fullname" . }}
  labels:
    {{- include "rancher-saddle.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rancher-saddle.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rancher-saddle.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/overlay: {{ include (print $.Template.BasePath "/configmap-overlay.yaml") . | sha256sum }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- $host := .Values.upstream.url | replace "https://" "" | replace "http://" "" | trimSuffix "/" }}
              HOST="{{ $host }}"
              HOST=$(echo $HOST | cut -d: -f1)
              echo "Waiting for DNS resolution of $HOST..."
              for i in $(seq 1 30); do
                if nslookup "$HOST" >/dev/null 2>&1; then
                  echo "DNS is ready."
                  break
                fi
                sleep 1
              done
              exec /docker-entrypoint.sh nginx -g "daemon off;"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /_saddle/mobile.css
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_saddle/mobile.css
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: overlay
              mountPath: /usr/share/nginx/saddle
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "rancher-saddle.fullname" . }}-nginx
        - name: overlay
          configMap:
            name: {{ include "rancher-saddle.fullname" . }}-overlay
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
