name: CI

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate rendered nginx config
        run: |
          mkdir -p /tmp/conf.d
          helm template test ./helm/rancher-saddle --set upstream.url=https://rancher.example.com \
            --show-only templates/configmap.yaml \
            | sed -n '/^  default.conf: |$/,$p' | tail -n +2 | sed 's/^    //' > /tmp/conf.d/default.conf
          docker run --rm \
            --add-host rancher.example.com:127.0.0.1 \
            -v /tmp/conf.d:/etc/nginx/conf.d:ro \
            nginx:alpine nginx -t

      - name: Run Helm template tests
        run: npm run test:helm

      - name: Set chart version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BASE=$(grep '^version:' helm/rancher-saddle/Chart.yaml | awk '{print $2}')
            VERSION="${BASE}-dev.$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: helm package helm/rancher-saddle --version ${{ steps.version.outputs.version }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR
        if: github.event_name != 'pull_request'
        run: helm push rancher-saddle-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ steps.version.outputs.owner }}/charts
